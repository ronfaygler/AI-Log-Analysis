services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_KEY_SALT: ${API_KEY_SALT}
      REDIS_QUEUE_NAME: ${REDIS_QUEUE_NAME:-logsentinel:jobs}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    depends_on:
      - mongo
      - redis
    networks:
      - logsentinel

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_QUEUE_NAME: ${REDIS_QUEUE_NAME:-logsentinel:jobs}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongo
      - redis
    networks:
      - logsentinel

  mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    ports:
      - "${MCP_PORT:-4001}:4001"
    environment:
      NODE_ENV: development
      PORT: 4001
      API_URL: http://api:4000
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - api
    networks:
      - logsentinel

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      VITE_API_URL: http://localhost:${API_PORT:-4000}
    depends_on:
      - api
    networks:
      - logsentinel

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongo_data:/data/db
    networks:
      - logsentinel

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - logsentinel

networks:
  logsentinel:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
